<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bio-Monitor 5.0 — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0d2e4e, #1a5276); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background:#fff; border-radius:16px; padding:2.5rem; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .brand { text-align:center; margin-bottom:2rem; }
    .brand h1 { font-size:1.8rem; font-weight:800; color:#0d2e4e; }
    .brand h1 span { color:#1a5276; }
    .brand p { color:#6c757d; font-size:.9rem; }
    .hint-box { background:#f0f4f8; border-radius:8px; padding:.8rem; font-size:.8rem; color:#555; }
    .hint-box code { background:#dde3ea; padding:1px 5px; border-radius:4px; }
    .btn-login { background:linear-gradient(135deg,#1a5276,#0d2e4e); border:none; width:100%; padding:.75rem; border-radius:8px; font-weight:600; font-size:1rem; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <h1><i class="bi bi-heart-pulse-fill" style="color:#dc3545"></i> Bio-<span>Monitor</span> 5.0</h1>
    <p>Taller: Gestión de la Innovación y Marcos Regulatorios IoT</p>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2"><i class="bi bi-x-circle me-1"></i> {{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Usuario</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="usuario" class="form-control" placeholder="Ej: dr.garcia" required>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Contraseña</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
      </div>
    </div>
    <button type="submit" class="btn btn-login text-white mb-4">
      <i class="bi bi-box-arrow-in-right me-1"></i> Iniciar Sesión (OAuth2)
    </button>
  </form>

  <div class="hint-box">
    <strong>Usuarios de prueba:</strong><br>
    <code>dr.garcia</code> / <code>pass123</code> — Médico<br>
    <code>paciente1</code> / <code>mipass</code> — Paciente<br>
    <code>device-007</code> / <code>devicepass</code> — Dispositivo IoT<br>
    <code>admin</code> / <code>adminpass</code> — Administrador
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
